services:
  neo4j:
    image: neo4j:5-community
    container_name: edunovas-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-edunovas_neo4j_password}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
    volumes:
      - edunovas_neo4j_data:/data
      - edunovas_neo4j_logs:/logs
      - edunovas_neo4j_plugins:/plugins

volumes:
  edunovas_neo4j_data:
  edunovas_neo4j_logs:
  edunovas_neo4j_plugins:
